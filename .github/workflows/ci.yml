name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore EventSourcingCqrs.slnx

      - name: Build
        run: dotnet build EventSourcingCqrs.slnx --no-restore

      - name: Test
        run: dotnet test EventSourcingCqrs.slnx --no-build --verbosity normal
